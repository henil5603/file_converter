<body>

    <div class="container">
        <h2>PDF Chatbot</h2>
        <p>Ask questions about your PDF files. Upload up to 3 PDFs and get instant answers.</p>
        <div class="chat-container">
            <div class="chat-header">PDF Chatbot</div>
            <div class="chat-body" id="chatBody">
                <div class="message bot-message">Welcome! Upload up to 3 PDF files and ask a question.</div>
            </div>
            <div class="chat-footer">
                <div class="file-upload-container">
                    <label for="fileInput">Upload PDFs (Max 3):</label>
                    <input type="file" id="fileInput" multiple accept="application/pdf">
                    <div id="fileError" class="error"></div>
                </div>
                <input type="text" id="questionInput" placeholder="Ask a question about the PDFs...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    <footer>
        <p>© 2024 Text to PDF Converter. All rights reserved.</p>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://sdk-generativeai.google.com/genai.js"></script>
    <script>
        // Set up pdf.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Replace with your Google Gemini API key
        const API_KEY = "AIzaSyAK2JLRbUa4PboYE81_xAxzQCmknOM71lI"; // Get from Google AI Studio
        const genAI = new google.generativeai.GenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro-latest" });

        const chatBody = document.getElementById("chatBody");
        const questionInput = document.getElementById("questionInput");
        const fileInput = document.getElementById("fileInput");
        const fileError = document.getElementById("fileError");

        async function sendMessage() {
            const question = questionInput.value.trim();
            const files = fileInput.files;

            if (!question) {
                fileError.textContent = "Please enter a question.";
                return;
            }

            if (files.length > 3) {
                fileError.textContent = "You can upload a maximum of 3 PDF files.";
                return;
            }

            if (files.length === 0) {
                fileError.textContent = "Please upload at least one PDF file.";
                return;
            }

            fileError.textContent = "";

            // Display user message
            const userMessage = document.createElement("div");
            userMessage.className = "message user-message";
            userMessage.textContent = question;
            chatBody.appendChild(userMessage);

            // Display uploaded file names
            if (files.length > 0) {
                const fileMessage = document.createElement("div");
                fileMessage.className = "message user-message";
                fileMessage.textContent = "Uploaded PDFs: " + Array.from(files).map(f => f.name).join(", ");
                chatBody.appendChild(fileMessage);
            }

            chatBody.scrollTop = chatBody.scrollHeight;

            try {
                // Prepare content for Gemini API
                const contents = [question];

                // Process PDFs and extract text
                for (let file of files) {
                    if (!file.name.endsWith('.pdf')) {
                        fileError.textContent = "Only PDF files are allowed.";
                        return;
                    }

                    const reader = new FileReader();
                    const pdfBytes = await new Promise((resolve) => {
                        reader.onload = () => resolve(new Uint8Array(reader.result));
                        reader.readAsArrayBuffer(file);
                    });

                    const pdf = await pdfjsLib.getDocument({ data: pdfBytes }).promise;
                    let textContent = '';
                    for (let i = 0; i < pdf.numPages; i++) {
                        const page = await pdf.getPage(i + 1);
                        const text = await page.getTextContent();
                        textContent += text.items.map(item => item.str).join(' ') + '\n';
                    }

                    // Add PDF text to contents
                    contents.push(textContent);
                }

                // Send request to Gemini API
                const result = await model.generateContent(contents);
                const response = await result.response;
                const text = response.text();

                // Display bot response
                const botMessage = document.createElement("div");
                botMessage.className = "message bot-message";
                botMessage.textContent = text;
                chatBody.appendChild(botMessage);
                chatBody.scrollTop = chatBody.scrollHeight;
            } catch (error) {
                const errorMessage = document.createElement("div");
                errorMessage.className = "message bot-message error";
                errorMessage.textContent = "Error: " + error.message;
                chatBody.appendChild(errorMessage);
                chatBody.scrollTop = (chatBody.scrollHeight);
            }

            // Clear inputs
            questionInput.value = "";
            fileInput.value = "";
        }

        // Handle Enter key press
        questionInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
